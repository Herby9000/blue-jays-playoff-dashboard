name: Update Blue Jays dashboard data

on:
  schedule:
    # Once a day, before North American morning checks.
    - cron: '15 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update data.json
        run: python3 scripts/update_data.py
      - name: Commit updated data if changed
        run: |
          if git diff --quiet data.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "Blue Jays data bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update Blue Jays dashboard data"
          git push
